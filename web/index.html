<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Submarine Depth Control — 2D Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Main two-column layout -->
<div id="main-layout">
  <!-- Left column: submarine view + controls -->
  <div id="left-column">
    <div id="game-container">
      <canvas id="gameCanvas"></canvas>
      <div class="hud" id="hud-title">&#x1F6A2; SUBMARINE DEPTH CONTROL</div>
      <div class="hud" id="hud-metrics">
        <div class="row"><span class="lbl">Time</span><span class="val" id="m-time">0.0 s</span></div>
        <div class="row"><span class="lbl">Depth</span><span class="val" id="m-depth" style="color:var(--blue)">0.0 mm</span></div>
        <div class="row"><span class="lbl">Target</span><span class="val" id="m-target" style="color:var(--pink)">500 mm</span></div>
        <div class="row"><span class="lbl">PBS</span><span class="val" id="m-pbs" style="color:var(--green)">0.0 ml</span></div>
        <div class="row"><span class="lbl">Velocity</span><span class="val" id="m-vel">0.0 mm/s</span></div>
        <div class="row"><span class="lbl">Status</span><span class="val" id="m-settle" style="color:var(--yellow)"></span></div>
      </div>
      <div class="hud" id="hud-hint">Click in water to set target depth</div>
    </div>
    <div id="controls">
      <div class="p-section">
        <h3>Target Depth</h3>
        <div class="val-display" id="slider-val">0.50 m</div>
        <input type="range" id="target-slider" min="0" max="2" step="0.01" value="0.50">
      </div>
      <div class="p-section">
        <h3>Hull Length</h3>
        <div class="val-display" id="length-val">300 mm</div>
        <input type="range" id="length-slider" min="100" max="600" step="1" value="300">
      </div>
      <div class="p-section">
        <h3>Hull Diameter</h3>
        <div class="val-display" id="diameter-val">50 mm</div>
        <input type="range" id="diameter-slider" min="20" max="100" step="1" value="50">
      </div>
      <div class="p-section">
        <h3>Hull Mass</h3>
        <div class="val-display" id="mass-val">574 g</div>
      </div>
      <div class="p-section">
        <h3>Velocity Sensor</h3>
        <label><input type="checkbox" id="chk-pressure" checked> Pressure</label>
        <label><input type="checkbox" id="chk-accel" checked> Accelerometer</label>
      </div>
      <div class="p-section">
        <h3>Accel Model</h3>
        <label><input type="radio" name="accel" value="mpu6050" checked> MPU6050</label>
        <label><input type="radio" name="accel" value="adxl355"> ADXL355</label>
      </div>
      <div class="p-section">
        <h3>Simulation</h3>
        <div class="btn-row">
          <button id="btn-play" class="active">&#x25B6;</button>
          <button id="btn-pause">&#x23F8;</button>
          <button id="btn-reset">&#x1F504;</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Right column: graphs -->
  <div id="right-column">
    <div class="graph-panel">
      <canvas id="graphDepth"></canvas>
    </div>
    <div class="graph-panel">
      <canvas id="graphPbs"></canvas>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
